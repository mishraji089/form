<!DOCTYPE html>
<html>
<head>
    <title>Users List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        .table-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/50 to-indigo-100/50 py-12 px-4 sm:px-6 lg:px-8">

<div id="alertBox" class="hidden mb-8 p-5 rounded-3xl shadow-2xl mx-auto max-w-2xl transition-all duration-300 glass border-0"></div>

<div class="max-w-7xl mx-auto">
    <div class="glass-card rounded-3xl p-8 lg:p-12 shadow-2xl border-0 overflow-hidden">
        
        <!-- Header -->
        <div class="relative mb-10 pb-8 border-b border-indigo-100/50">
            <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/5 to-purple-500/5 -skew-x-3"></div>
            <div class="relative flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
                <div>
                    <h2 class="text-4xl lg:text-5xl font-black bg-gradient-to-r from-gray-900 via-indigo-900 to-purple-900 bg-clip-text text-transparent tracking-tight">
                        All Registered Users
                    </h2>
                    <p class="text-gray-600 mt-2 font-medium text-lg">Manage and view your user database</p>
                </div>
                <div class="flex gap-4">

    <!-- Reports Button -->
    

    <!-- Back Button -->
    <a href="/back"
       class="group relative bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-8 py-4 rounded-2xl text-lg font-semibold shadow-xl hover:shadow-2xl transition-all duration-300 flex items-center gap-3 transform hover:-translate-y-1">
        <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Form
    </a>

</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col lg:flex-row justify-between items-stretch lg:items-center gap-6 mb-10 p-6 bg-white/60 backdrop-blur-sm rounded-3xl border border-indigo-100/30 shadow-lg">
            <div class="relative flex-grow lg:w-1/3">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                    <svg class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input id="searchInput" type="text" placeholder="Search by name or email..."
                       class="block w-full pl-16 pr-6 py-4 border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm rounded-2xl text-gray-900 text-lg font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 focus:bg-white transition-all duration-200 shadow-sm hover:border-indigo-300 hover:shadow-md"
                       onkeyup="searchUsers()"/>
            </div>
        </div>

        <!-- Table -->
        <div class="table-glass rounded-3xl border border-indigo-200/30 shadow-2xl overflow-hidden backdrop-blur-xl">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-indigo-100">
                    <thead class="bg-gradient-to-r from-indigo-600 via-indigo-700 to-purple-700">
                        <tr>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">ID</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">State</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">Name</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">Email</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">Gender</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">DOB</th>
                            <th class="py-6 px-8 text-left text-xl font-black text-white tracking-wider uppercase">Action</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable" class="divide-y divide-gray-100 bg-white/70">
                        <tr>
                            <td colspan="7" class="text-center py-20 text-gray-500">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center">
                                        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H5a3 3 0 00-3 3v1h12v-1a3 3 0 00-3-3zM17 20v-2c0-.656.126-1.283.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857"/>
                                        </svg>
                                    </div>
                                    <span class="text-2xl font-semibold">Loading users...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<script>
	
	let allUsers=[];
	
const API = "http://localhost:8080/users";



function searchUsers(){
	
	const searchValue=document.getElementById("searchInput").value.toLowerCase();
	const filtered = allUsers.filter(user => 
        user.name.toLowerCase().includes(searchValue) ||
        user.email.toLowerCase().includes(searchValue)
    );

    renderUsers(filtered);
}





async function loadUsers(){
const table = document.getElementById("usersTable");
try{
table.innerHTML = `
<tr>
<td colspan="7" class="text-center py-4 text-gray-500">
Loading users...
</td>
</tr>
`;
const res = await fetch(API);
if(!res.ok){
throw new Error("Failed to fetch users");
}


allUsers = await res.json();
renderUsers(allUsers);

}
catch(error){
console.error(error);
table.innerHTML = `
<tr>
<td colspan="7" class="text-center py-20 text-red-500 bg-red-50/50 rounded-2xl">
    <div class="flex flex-col items-center gap-4 p-8">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-2xl font-bold">Failed to load users</span>
    </div>
</td>
</tr>
`;
showAlert("Failed to load users","error");
}
}

function renderUsers(users){

    const table = document.getElementById("usersTable");
    table.innerHTML = "";

    if(users.length === 0){
        table.innerHTML = `
        <tr>
            <td colspan="7" class="text-center py-4 text-gray-500">
                No users found
            </td>
        </tr>
        `;
        return;
    }

    users.forEach(user => {

        const tr = document.createElement("tr");
        
        tr.className = "hover:bg-indigo-50 cursor-pointer";
        tr.onclick = () => editUser(user.id);
        

        tr.innerHTML = `
        <td class="py-2 px-4">${user.id}</td>
        <td class="py-2 px-4">${user.state?.stateNameEnglish || ""}</td>
        <td class="py-2 px-4">${user.name}</td>
        <td class="py-2 px-4">${user.email}</td>
        <td class="py-2 px-4">${user.gender}</td>
        <td class="py-2 px-4">${formatDate(user.dob)}</td>
        <td class="py-2 px-4">
            <button onclick="deleteUser(event, ${user.id})"
            class="bg-red-500 text-white px-2 py-1 rounded">
            Delete
            </button>
        </td>
        `;

        table.appendChild(tr);
    });
}

function formatDate(date){
const d = new Date(date);
return d.toLocaleDateString("en-IN");
}

function editUser(id){
window.location.href="/form?id="+id;
}

async function deleteUser(event,id){
event.stopPropagation();
if(!confirm("Are you sure you want to delete this user?")){
return;
}
try{
const res = await fetch(API + "/" + id,{
method:"DELETE"
});
if(!res.ok){
throw new Error("Delete failed");
}
showAlert("User deleted successfully","success");
loadUsers();
}
catch(error){
console.error(error);
showAlert("Failed to delete user","error");
}
}

function showAlert(message,type="success"){
const alertBox=document.getElementById("alertBox");
alertBox.innerText=message;
alertBox.classList.remove("hidden","bg-green-100","text-green-800","bg-red-100","text-red-800");
if(type==="success"){
alertBox.classList.add("bg-gradient-to-r","from-emerald-400/20","to-green-400/20","text-emerald-800","border-2","border-emerald-200/50","shadow-2xl");
}
else{
alertBox.classList.add("bg-gradient-to-r","from-red-400/20","to-rose-400/20","text-red-800","border-2","border-red-200/50","shadow-2xl");
}
alertBox.classList.remove("hidden");
setTimeout(()=>{
alertBox.classList.add("hidden");
},4000);
}

window.onload = loadUsers;
</script>

</body>
</html>
