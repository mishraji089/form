<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .glass-nav { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .input-focus { 
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .btn-glow { 
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100">

<div id="alertBox" class="hidden mb-6 p-4 rounded-2xl text-sm shadow-lg mx-4 sm:mx-0 transition-all duration-300"></div>

<nav class="glass-nav px-6 py-4 shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4 w-full lg:w-auto">
            <div class="flex shadow-2xl rounded-2xl overflow-hidden bg-white/80 backdrop-blur-sm">
                <div class="relative flex-grow lg:w-96">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input id="searchEmail" type="email" placeholder="Search user by email..." 
                           class="block w-full pl-14 pr-4 py-3.5 border-0 bg-white/50 backdrop-blur-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white rounded-l-2xl text-sm font-medium">
                </div>
                <button onclick="searchUser()" 
                        class="px-8 py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white text-sm font-semibold rounded-r-2xl shadow-lg hover:shadow-xl transition-all duration-200 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    Search
                </button>
            </div>
        </div>
        <a href="/reports"
       class="group relative bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white px-8 py-4 rounded-2xl text-lg font-semibold shadow-xl hover:shadow-2xl transition-all duration-300 flex items-center gap-3 transform hover:-translate-y-1">
        <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6m4 6V7m4 10v-4M5 21h14"/>
        </svg>
        Reports
    </a>
        
        <div class="flex items-center gap-3 flex-wrap">
            <a href="/users-page" class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-6 py-3 rounded-2xl text-sm font-semibold shadow-lg hover:shadow-xl transition-all duration-200 backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5V4H2v16h5m10 0v-4a4 4 0 10-8 0v4m8 0H9"/>
                </svg>
                Show Users
            </a>
            
            <form action="/logout" method="post" class="inline">
                <button type="submit" class="flex items-center gap-2 bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 text-white px-6 py-3 rounded-2xl text-sm font-semibold shadow-lg hover:shadow-xl transition-all duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="flex justify-center items-center min-h-[calc(100vh-120px)] px-4 py-12">
    <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-lg border-0 relative overflow-hidden bg-white/60 backdrop-blur-xl">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5 rounded-3xl"></div>
        
        <div class="relative mb-10 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-100 to-purple-100 text-indigo-600 shadow-xl mb-6 border-4 border-white/50">
                <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h2 class="text-3xl lg:text-4xl font-black text-gray-900 tracking-tight bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text">User Details</h2>
            <p class="text-sm text-gray-600 mt-2 font-medium max-w-xs mx-auto leading-relaxed">Enter or modify the user's profile information below.</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label for="name" class="block text-sm font-semibold text-gray-800 tracking-wide">Full Name</label>
                <input id="name" type="text" placeholder="e.g. Jane Doe"
                       class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm text-gray-900 text-base font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all duration-200 hover:border-gray-300 shadow-sm">
                       <p id="nameError" class="text-red-500 text-sm hidden"></p>
            </div>

            <div class="space-y-2">
                <label for="email" class="block text-sm font-semibold text-gray-800 tracking-wide">Email Address</label>
                <input id="email" type="email" placeholder="jane@example.com"
                       class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm text-gray-900 text-base font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all duration-200 hover:border-gray-300 shadow-sm">
                       
                       <p id="emailError" class="text-red-500 text-sm mt-1 hidden"></p>
                       
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="gender" class="block text-sm font-semibold text-gray-800 tracking-wide">Gender</label>
                    <select id="gender" 
                            class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm text-gray-900 text-base font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all duration-200 hover:border-gray-300 shadow-sm appearance-none">
                        <option value="" disabled selected>Select...</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <p id="genderError" class="text-red-500 text-sm hidden"></p>
                </div>

                <div class="space-y-2">
                    <label for="dob" class="block text-sm font-semibold text-gray-800 tracking-wide">Date of Birth</label>
                    <input id="dob" type="date"
                           class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm text-gray-900 text-base font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all duration-200 hover:border-gray-300 shadow-sm">
                <p id="dobError" class="text-red-500 text-sm hidden"></p>
                </div>
            </div>

            <div class="space-y-2">
                <label for="stateId" class="block text-sm font-semibold text-gray-800 tracking-wide">State</label>
                <select id="stateId"
                        class="w-full px-5 py-4 rounded-2xl border-2 border-gray-200/50 bg-white/80 backdrop-blur-sm text-gray-900 text-base font-medium focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 focus:bg-white transition-all duration-200 hover:border-gray-300 shadow-sm appearance-none">
                    <option value="">Select States</option>        
                </select>
                <p id="stateIdError" class="text-red-500 text-sm hidden"></p>
            </div>
        </div>

        <div class="mt-12 space-y-4 pt-8 border-t border-gray-200/50">
            <button onclick="addUser()"
        class="w-full flex justify-center items-center gap-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-black py-5 px-6 rounded-3xl transition-all duration-200 shadow-2xl hover:shadow-3xl hover:-translate-y-1 text-lg focus:outline-none focus:ring-4 focus:ring-indigo-500/50 relative z-10 select-none touch-manipulation">
    <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
    </svg>
    Add New User
</button>


            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <button id="updateBtn" onclick="updateUser()"
                        class="group w-full bg-white/60 backdrop-blur-sm border-2 border-amber-300/50 text-amber-800 hover:bg-amber-50/80 hover:border-amber-400 font-semibold py-4 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-xl hover:-translate-y-0.5 text-sm">
                    <span class="group-hover:translate-x-1 transition-transform">Update</span>
                </button>

                <button onclick="clearForm()"
                        class="w-full bg-white/60 backdrop-blur-sm border-2 border-gray-300/50 text-gray-800 hover:bg-gray-50/80 hover:border-gray-400 font-semibold py-4 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-xl hover:-translate-y-0.5 text-sm">
                    Clear Form
                </button>
            </div>
        </div>
    </div>
</div>


<script>
    var API="http://localhost:8080/users";
    var selectedId=null;
    var state_API="http://localhost:8080/states"
    
    
    
    
    
    
    
function showFieldError(inputId, message){

const input = document.getElementById(inputId);
const error = document.getElementById(inputId + "Error");

input.classList.add("border-red-500","ring-2","ring-red-200");
error.innerText = message;
error.classList.remove("hidden");

}







function clearFieldError(inputId){

const input = document.getElementById(inputId);
const error = document.getElementById(inputId + "Error");

input.classList.remove("border-red-500","ring-2","ring-red-200");
error.innerText = "";
error.classList.add("hidden");

}







    
    async function searchUser(){
    const email=document.getElementById("searchEmail").value.trim();
    if(email===""){
    alert("Please enter email");
    return;
    }
    try{
    const res=await fetch(API+"/email/"+encodeURIComponent(email));
    if(!res.ok){
    throw new Error("User not found");
    }
    const user=await res.json();
    selectedId=user.id;
    document.getElementById("name").value=user.name;
    document.getElementById("email").value=user.email;
    document.getElementById("gender").value=user.gender;
    document.getElementById("dob").value=user.dob;
    document.getElementById("stateId").value=user.state.stateCode;
    
    alert("User loaded successfully");
    }
    catch(error){
    alert("User not found");
    console.log(error);
    }
    }










    async function addUser(){

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const gender = document.getElementById("gender").value;
    const dob = document.getElementById("dob").value;
    const stateId = document.getElementById("stateId").value;

    ["name","email","gender","dob","stateId"].forEach(id=>{
        document.getElementById(id).addEventListener("input",()=>{
            clearFieldError(id);
        });
    });

   
    if(!email){
        showFieldError("email","Email is Required");
        return;
    }

    if(!isValidEmail(email)){
        showFieldError("email","Invalid email format");
        return;
    }

    
    try{
        const checkRes = await fetch(API + "/check-email?email=" + email);

        if(checkRes.ok){
            const exists = await checkRes.json();

            if(exists){
                showFieldError("email","Email already exists");
                return;
            }
        }
    }catch(err){
        console.error("Email check failed", err);
    }

    
    let isValid = true;

    if(!name){
        showFieldError("name","Name is Required");
        isValid = false;
    }

    if(!gender){
        showFieldError("gender","Select gender");
        isValid = false;
    }

    if(!dob){
        showFieldError("dob","Date of birth is required");
        isValid = false;
    }

    if(!stateId){
        showFieldError("stateId","Please select the state");
        isValid = false;
    }

    if(!isValid) return;

    
    const user = {
        name,
        email,
        gender,
        dob,
        state:{
            stateCode:Number(stateId)
        }
    };

    try{
        const res = await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        });

        if(res.status === 409){
            showFieldError("email","Email already exists");
            return;
        }

        if(!res.ok){
            throw new Error("Failed to add user");
        }

        alert("User added successfully");
        clearForm();

    }catch(err){
        alert(err.message);
        console.error(err);
    }
}
    
    
    
    
    
    
    
    
    
    
    async function updateUser(){
    const email = document.getElementById("email").value.trim();
    const name = document.getElementById("name").value.trim();
    const gender = document.getElementById("gender").value;
    const dob = document.getElementById("dob").value;
    const stateId = document.getElementById("stateId").value;
    if(!email){
    alert("Please enter email");
    return;
    }
    try{
    if(!selectedId){
    const res = await fetch(API + "?email=" + email);
    const users = await res.json();
    if(users.length === 0){
    alert("User does not exist");
    return;
    }
    const user = users[0];
    selectedId = user.id;
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
    document.getElementById("gender").value = user.gender;
    document.getElementById("dob").value = user.dob;
    document.getElementById("stateId").value = user.stateId;
    alert("User found. Modify fields and click Update again.");
    document.getElementById("updateBtn").innerText = "Save Update";
    }
    else{
    
    if(!name || !gender || !dob || !stateId){
    alert("Please fill all fields");
    return;
    }
    const user = {
    name,
    email,
    gender,
    dob,
    state:{
    stateCode: Number(stateId)
    }
    };
    await fetch(API + "/" + selectedId,{
    method:"PUT",
    headers:{
    "Content-Type":"application/json"
    },
    body:JSON.stringify(user)
    });
    alert("User updated successfully ");
    clearForm();
    selectedId = null;
    document.getElementById("updateBtn").innerText = "Search User";
    }
    }
    catch(error){
    console.error("Error is: ",error);
    alert("Something went wrong");
    }
    }
    
    
    
    
    
    
    
    function clearForm(){
    document.getElementById("name").value="";
    document.getElementById("email").value="";
    document.getElementById("gender").value="";
    document.getElementById("dob").value="";
    document.getElementById("stateId").value="";
    selectedId=null;
    }
    
    
    
    
    
    
    async function loadStates(){
    const dropdown = document.getElementById("stateId");
    try{
    dropdown.innerHTML = '<option>Loading states...</option>';
    const res = await fetch("http://localhost:8080/states");
    if(!res.ok){
    throw new Error("Failed to fetch states");
    }
    const data = await res.json();
    data.sort((a,b)=> 
    a.stateNameEnglish.localeCompare(b.stateNameEnglish)
    );
    dropdown.innerHTML = '<option value="">Select State</option>';
    data.forEach(state => {
    const option = document.createElement("option");
    option.value = state.stateCode;
    option.textContent = state.stateNameEnglish;
    dropdown.appendChild(option);
    });
    }
    catch(error){
    console.error(error);
    dropdown.innerHTML = '<option value="">Unable to load states</option>';
    alert("Failed to load states");
    }
    }





    function showUsersPage(){
    window.location.href="users.html";
    }
    
    
    
    
    
    
   function loadUserFromURL(){ const params = new URLSearchParams(window.location.search); 
   const id = params.get("id"); 
   if(!id) return; 
   fetch("http://localhost:8080/users/"+id)
    .then(res => res.json())
    .then(function(user){
	 selectedId = user.id;
	 document.getElementById("name").value = user.name;
	 document.getElementById("email").value = user.email; 
	 document.getElementById("gender").value = user.gender; 
	 document.getElementById("dob").value = user.dob; 
	 document.getElementById("stateId").value = user.state.stateCode;
	  }); 
	  }
 
 
 
 
 
 
 
    function showAlert(message,type="success"){
    const alertBox=document.getElementById("alertBox");
    alertBox.innerText=message;
    alertBox.classList.remove("hidden","bg-green-100","text-green-800","bg-red-100","text-red-800","shadow-2xl");
    if(type==="success"){
    alertBox.classList.add("bg-gradient-to-r","from-green-400/20","to-emerald-400/20","text-green-800","backdrop-blur-sm","border","border-green-200/50","shadow-2xl");
    }
    else{
    alertBox.classList.add("bg-gradient-to-r","from-red-400/20","to-rose-400/20","text-red-800","backdrop-blur-sm","border","border-red-200/50","shadow-2xl");
    }
    alertBox.classList.remove("hidden");
    setTimeout(()=>{
    alertBox.classList.add("hidden");
    },4000);
    }
    
    function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}




    window.onload = function(){
    loadStates();
    loadUserFromURL();
    }
    
</script>

</body>
</html>
