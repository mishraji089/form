  font-weight: 600;

#printBtn:hover {

@media print {

  /* REMOVE SCROLL BLOCK (MAIN ISSUE) */
  .overflow-x-auto {
    overflow: visible !important;
  }

  div {
    height: auto !important;
    max-height: none !important;

  table {
    width: 100% !important;
    border-collapse: collapse;
  }

    display: table-header-group;
  }

    page-break-inside: avoid;
  }

    border: 1px solid black;
    padding: 8px;
    color: black !important;

  }

  /* hide UI */

    display: none !important;
  }
}

<script>
	
const API="http://localhost:8080/users";








function formatDate(date){
	const d=new Date(date);
	return d.toLocaleDateString("en-IN");
}








async function loadStates(){
	
	const dropdown = document.getElementById("stateFilter");

	const res = await fetch("http://localhost:8080/states");
	const states = await res.json();
	
	states.sort((a,b)=>a.stateNameEnglish.localeCompare(b.stateNameEnglish));
	
	states.forEach(state=>{
		const option=document.createElement("option");
		option.value=state.stateCode;
		option.textContent=state.stateNameEnglish;
		dropdown.append(option);
		
		
	});	
}









async function loadUsers(){

    const table = document.getElementById("usersTable");
    const stateId = document.getElementById("stateFilter").value;

    try{

      
        table.innerHTML = `
        <tr>
            <td colspan="6" class="text-center py-4">Loading...</td>
        </tr>
        `;

        
        let url = "http://localhost:8080/users";

        if(stateId){
            url += "?stateId=" + stateId;
        }

       
        const res = await fetch(url);

        if(!res.ok){
            throw new Error("Failed to fetch users");
        }

        const users = await res.json();

        table.innerHTML = "";

       
        if(users.length === 0){
            table.innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-4 text-gray-500">
                    No users found
                </td>
            </tr>
            `;
            return;
        }

       
        users.forEach(user => {

            const tr = document.createElement("tr");

            tr.innerHTML = `
            <td class="py-2 px-4">${user.id}</td>
            <td class="py-2 px-4">${user.state?.stateNameEnglish || ""}</td>
            <td class="py-2 px-4">${user.name}</td>
            <td class="py-2 px-4">${user.email}</td>
            <td class="py-2 px-4">${user.gender}</td>
            <td class="py-2 px-4">${formatDate(user.dob)}</td>
            `;

            table.appendChild(tr);
        });

    }catch(err){
        console.error(err);

        table.innerHTML = `
        <tr>
            <td colspan="6" class="text-center py-4 text-red-500">
                Failed to load users
            </td>
        </tr>
        `;
    }
}









function searchUsers(){

const input = document.getElementById("searchInput").value.toLowerCase();
const rows = document.querySelectorAll("#usersTable tr");

rows.forEach(row=>{
const text = row.innerText.toLowerCase();
row.style.display = text.includes(input) ? "" : "none";
});

}






function downloadReport(){
    let table = document.getElementById("usersTable");
    let data = [];

    // Header
    data.push(["State","Name","Email","Gender","DOB"]);

    let rows = table.querySelectorAll("tr");

    rows.forEach(row => {
        let cols = row.querySelectorAll("td");

        if(cols.length > 0){
            data.push([
                cols[1].innerText,
                cols[2].innerText,
                cols[3].innerText,
                cols[4].innerText,
                cols[5].innerText
            ]);
        }
    });

    let worksheet = XLSX.utils.aoa_to_sheet(data);
    let workbook = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(workbook, worksheet, "Reports");

    XLSX.writeFile(workbook, "Users_Report.xlsx");
}


function printReport(){

    const table = document.getElementById("usersTable");

    if(table.children.length === 0){
        alert("No data to print");
        return;
    }

    // Create new window
    let printWindow = window.open('', '', 'width=900,height=700');

    let html = `
        <html>
        <head>
            <title>User Report</title>
            <style>
                body {
                    font-family: Arial;
                    padding: 20px;
                }
                h2 {
                    text-align: center;
                }
                table {
                    width: 100%;
                    border-collapse: collapse;
                }
                th, td {
                    border: 1px solid black;
                    padding: 8px;
                    text-align: left;
                }
                th {
                    background: #eee;
                }
            </style>
        </head>
        <body>

        <h2>User Report</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>State</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Gender</th>
                    <th>DOB</th>
                </tr>
            </thead>
            <tbody>
                ${table.innerHTML}
            </tbody>
        </table>

        </body>
        </html>
    `;

    printWindow.document.write(html);
    printWindow.document.close();

    printWindow.focus();

    setTimeout(() => {
        printWindow.print();
        printWindow.close();
    }, 500);
}








window.onload = function(){
loadStates();
loadUsers();
};
	
	
</script>
